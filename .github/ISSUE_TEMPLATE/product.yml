name: Product Module
description: Product management system
title: "[PRODUCT] "
labels: ["product"]

body:
  - type: markdown
    attributes:
      value: |
        Select one or more tasks.

  - type: checkboxes
    id: core
    attributes:
      label: Core API
      options:
        - label: Create Product schema and model
        - label: GET all products
        - label: GET single product
        - label: POST create product (admin only)
        - label: PUT/PATCH update product (admin only)
        - label: DELETE product (admin only)

  - type: checkboxes
    id: bonus
    attributes:
      label: Bonus Features (optional)
      options:
        - label: Pagination
        - label: Search / Filtering
        - label: Sorting