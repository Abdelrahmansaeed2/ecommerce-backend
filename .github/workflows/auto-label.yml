name: Auto Add Label

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-label:
    runs-on: ubuntu-latest

    steps:
      - name: Add label based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            let label = "task";

            if (title.includes("[middleware]")) label = "middleware";
            else if (title.includes("[auth]")) label = "auth";
            else if (title.includes("[product]")) label = "product";
            else if (title.includes("[category]")) label = "category";
            else if (title.includes("[order]")) label = "order";

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });