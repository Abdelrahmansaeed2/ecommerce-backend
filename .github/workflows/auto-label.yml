name: Smart Issue Automation

on:
  issues:
    types: [opened, assigned, closed]

permissions:
  issues: write

jobs:
  manage-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Smart labeling system
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let labels = [];

            // ========= MODULE =========
            if (title.includes("[middleware]")) labels.push("middleware");
            else if (title.includes("[auth]")) labels.push("auth");
            else if (title.includes("[product]")) labels.push("product");
            else if (title.includes("[category]")) labels.push("category");
            else if (title.includes("[order]")) labels.push("order");
            else labels.push("task");

            // ========= STATUS =========
            if (context.payload.action === "opened") {
              labels.push("todo");
            }

            if (context.payload.action === "assigned") {
              labels.push("in-progress");
            }

            if (context.payload.action === "closed") {
              labels.push("done");
            }

            // ========= PRIORITY =========
            if (title.includes("urgent")) labels.push("high");
            else if (title.includes("important")) labels.push("medium");
            else labels.push("low");

            // ========= CREATE LABELS IF NOT EXIST =========
            const { data: existingLabels } = await github.rest.issues.listLabelsForRepo({
              owner,
              repo
            });

            for (const label of labels) {
              const exists = existingLabels.find(l => l.name === label);

              if (!exists) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: "0E8A16"
                });
              }
            }

            // ========= APPLY LABELS =========
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: labels
            });

      - name: Auto assign issue creator
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [issue.user.login]
            });