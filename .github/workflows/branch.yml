name: Create Branch Per Developer

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  create-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create branch
        run: |
          BRANCH="feature/${{ github.event.issue.labels[0].name }}-${{ github.actor }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b $BRANCH
          git push origin $BRANCH