name: Validate Issue

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check checklist
        run: |
          BODY="${{ github.event.issue.body }}"
          if [[ "$BODY" != *"- [ ]"* ]]; then
            echo "Issue must contain checklist"
            exit 1
          fi