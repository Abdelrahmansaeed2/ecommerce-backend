name: Validate Pull Request

on:
  pull_request:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR linked to issue
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [[ "$BODY" != *"Closes #"* ]]; then
            echo "Pull request must reference an issue"
            exit 1
          fi